# KAZA production — Nginx base config. Vhosts are generated from
# /etc/nginx/templates/*.conf.template via the image's envsubst entrypoint.
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;
    server_tokens   off;                 # don't leak version

    # Uploads can be large; allow generous request bodies (tune as needed).
    client_max_body_size 50m;

    # Compression
    gzip              on;
    gzip_vary         on;
    gzip_proto_min    1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml;

    # Baseline security headers (HSTS is added per-host on the 443 servers).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Docker embedded DNS — lets backends restart without taking Nginx down.
    resolver 127.0.0.11 valid=30s ipv6=off;

    include /etc/nginx/conf.d/*.conf;
}
