# ============================================================================
# KAZA — PRODUCTION stack (Hostinger KVM 4). Single-VPS, prod-only.
# ----------------------------------------------------------------------------
#   docker compose -f docker-compose.prod.yml --env-file /opt/kaza/env/.env.production up -d --build
#
# Rules enforced here:
#   - Postgres is NOT published to the host (internal network only).
#   - API + frontends are reachable ONLY through Nginx (no published ports).
#   - All secrets come from the --env-file; nothing is hardcoded.
#   - Existing project files are untouched: the API still builds from its own
#     RentalPlatform.API/Dockerfile; ASPNETCORE_ENVIRONMENT=Production here
#     OVERRIDES the image's baked-in Development default at runtime.
# ============================================================================

name: kaza-prod

services:
  # ── PostgreSQL 16 (internal only) ──
  db:
    image: postgres:16-alpine            # pinned major; record digest in docs/deployment.md (B5)
    container_name: kaza-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # First-boot schema build. PROD init excludes dev seeds (no dev logins/master data)
      # and records the schema_migrations baseline. Runs ONLY on an empty volume.
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations:ro
      - ./infra/db/init.prod.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  # ── .NET API (internal only; fronted by Nginx) ──
  api:
    build:
      context: .
      dockerfile: RentalPlatform.API/Dockerfile   # existing file, unchanged
    image: kaza-api:prod
    container_name: kaza-prod-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}        # overrides image default
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Jwt__Secret: ${Jwt__Secret}
      Jwt__Issuer: ${Jwt__Issuer}
      Jwt__Audience: ${Jwt__Audience}
      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0}
      Cors__AllowedOrigins__1: ${Cors__AllowedOrigins__1}
    volumes:
      # VPS-local persistent uploads: host ${UPLOADS_HOST_PATH} (/opt/kaza/uploads) mounts to
      # the container path ${UPLOADS_PATH} (/app/uploads), where the API writes uploaded images.
      - ${UPLOADS_HOST_PATH:-/opt/kaza/uploads}:${UPLOADS_PATH:-/app/uploads}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
      - public
    # NOTE: no container healthcheck — the aspnet image has no curl/wget. Readiness is
    # gated externally by the deploy workflow (curl https://<API_DOMAIN>/api/projects).

  # ── Public storefront (demo, Next 16 -> next start :3000) ──
  demo:
    build:
      context: ./demo
      dockerfile: ../infra/docker/demo.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://${API_DOMAIN}"
        NEXT_PUBLIC_PLATFORM_URL: "https://${PORTAL_DOMAIN}"
        NEXT_PUBLIC_STORAGE_URL: "${NEXT_PUBLIC_STORAGE_URL}"   # absolute API origin => images at https://API_DOMAIN/uploads
    image: kaza-demo:prod
    container_name: kaza-prod-demo
    restart: unless-stopped
    networks:
      - public

  # ── Operational portals (rental-platform, Next 14 -> next start :3001) ──
  portal:
    build:
      context: ./rental-platform
      dockerfile: ../infra/docker/portal.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://${API_DOMAIN}"
        NEXT_PUBLIC_STORAGE_URL: "${NEXT_PUBLIC_STORAGE_URL}"   # absolute API origin => images at https://API_DOMAIN/uploads
        NEXT_PUBLIC_APP_ENV: "production"
        NEXT_PUBLIC_MAPBOX_TOKEN: "${NEXT_PUBLIC_MAPBOX_TOKEN}"
        NEXT_PUBLIC_ALLOWED_RETURN_ORIGINS: "https://${PORTFOLIO_DOMAIN}"
    image: kaza-portal:prod
    container_name: kaza-prod-portal
    restart: unless-stopped
    environment:
      # `next start` RE-EVALUATES next.config.mjs at runtime, so the env-driven
      # images.remotePatterns needs the image host at RUNTIME (not only as a build arg).
      NEXT_PUBLIC_STORAGE_URL: "${NEXT_PUBLIC_STORAGE_URL}"
      NEXT_PUBLIC_API_URL: "https://${API_DOMAIN}"
    networks:
      - public

  # ── Reverse proxy / TLS termination ──
  nginx:
    image: nginx:1.27-alpine
    container_name: kaza-prod-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Consumed by the image's envsubst entrypoint to render the vhost templates.
      PORTFOLIO_DOMAIN: ${PORTFOLIO_DOMAIN}
      PORTAL_DOMAIN: ${PORTAL_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/templates:/etc/nginx/templates:ro   # *.conf.template -> /etc/nginx/conf.d/*.conf
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      # Same VPS-local uploads path, READ-ONLY, served as static files under /uploads/
      # on the API domain (see infra/nginx/templates/api.conf.template).
      - ${UPLOADS_HOST_PATH:-/opt/kaza/uploads}:/var/www/uploads:ro
    depends_on:
      - demo
      - portal
      - api
    networks:
      - public
    # Render the vhost templates (the image only runs /docker-entrypoint.d/* when the
    # command starts with `nginx`; a /bin/sh command skips envsubst), then reload every
    # 6h so renewed certs are picked up without a full restart.
    command: ["/bin/sh", "-c", "/docker-entrypoint.d/20-envsubst-on-templates.sh; while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"]

  # ── Certbot (Let's Encrypt issuance + auto-renew via webroot) ──
  certbot:
    image: certbot/certbot:v3.1.0
    container_name: kaza-prod-certbot
    restart: unless-stopped
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Attempt renewal twice daily; Certbot only acts when a cert is near expiry.
    entrypoint: ["/bin/sh", "-c", "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"]

volumes:
  postgres_data:
  certbot_certs:
  certbot_webroot:
  # NOTE: uploads are now a host bind mount (${UPLOADS_HOST_PATH:-/opt/kaza/uploads}),
  # not a named volume — persistent on the VPS and served read-only by Nginx.

networks:
  public:
  internal:
    internal: true     # no outbound internet for the DB tier
