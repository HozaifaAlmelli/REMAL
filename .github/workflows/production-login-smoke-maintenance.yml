name: Production Login Smoke Maintenance

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-login-smoke-maintenance
  cancel-in-progress: false

jobs:
  login-smoke-maintenance:
    name: Backup DB, apply owner contact migration, and verify smoke logins
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Run maintenance over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -eu

            APP_DIR="/opt/apps/kaza-booking"
            ENV_FILE="/opt/kaza/env/.env.production"

            if [ ! -d "$APP_DIR" ]; then
              echo "FATAL: app directory missing: $APP_DIR" >&2
              exit 1
            fi

            if [ ! -s "$ENV_FILE" ]; then
              echo "FATAL: env file missing or empty: $ENV_FILE" >&2
              exit 1
            fi

            cd "$APP_DIR"
            if [ -n "$(git status --porcelain)" ]; then
              echo "FATAL: live repo has local changes" >&2
              git status --short
              exit 1
            fi

            git fetch origin main --quiet
            git checkout main
            git pull --ff-only origin main

            bash scripts/production-login-smoke-maintenance.sh
