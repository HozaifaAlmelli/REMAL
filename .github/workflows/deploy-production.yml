name: Deploy Production

# Production deploy: push to main, OR manual dispatch. The `production` GitHub
# Environment gates this with a MANUAL APPROVAL and restricts it to the main branch.
# Build happens ON the VPS (Option A); no registry. DB migrations are NOT run here.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never interrupt an in-flight production deploy

jobs:
  deploy:
    name: SSH deploy to KVM 4
    runs-on: ubuntu-latest
    environment: production    # <- manual-approval gate + branch restriction live here
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -eu

            DEPLOY_SHA="${{ github.sha }}"
            APP_DIR="/opt/apps/kaza-booking"
            ENV_FILE="/opt/kaza/env/.env.production"

            if [ ! -d "$APP_DIR" ]; then
              echo "FATAL: app directory missing: $APP_DIR"
              exit 1
            fi

            if [ ! -s "$ENV_FILE" ]; then
              echo "FATAL: env file missing or empty: $ENV_FILE"
              exit 1
            fi

            cd "$APP_DIR"
            if [ -n "$(git status --porcelain)" ]; then
              echo "FATAL: live repo has local changes"
              git status --short
              exit 1
            fi

            echo "### Fetching main"
            git fetch origin main --quiet
            git checkout main
            git pull --ff-only origin main

            if [ "$(git rev-parse HEAD)" != "$DEPLOY_SHA" ]; then
              echo "FATAL: checked out SHA $(git rev-parse HEAD) does not match deploy SHA $DEPLOY_SHA"
              exit 1
            fi

            sh scripts/deploy-production.sh "$DEPLOY_SHA"
